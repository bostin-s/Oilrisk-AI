services:
  - type: web
    name: oilrisk-ai
    env: python
    buildCommand: pip install -r requirements.txt && pip install gunicorn
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 4 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0